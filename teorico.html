<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Teórico Clase B // Simulador Oficial 2026</title>
    <meta name="description" content="Simulador oficial de examen teórico de conducir Clase B en Chile. 35 preguntas exactas del Libro del Nuevo Conductor. Practica gratis y aprueba.">
    <meta name="keywords" content="examen teorico conducir, clase b, chile, preguntas examen conducir, conaset, libro nuevo conductor">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- SEO -->
    <meta property="og:title" content="Examen Teórico Clase B // Simulador Oficial">
    <meta property="og:description" content="Ensayo municipal de 35 preguntas con 100% de exactitud.">
</head>
<body class="brutalist-theme">
    
    <header class="brutal-header">
        <div class="brand-text">
            <a href="javascript:void(0)" onclick="manejarBotonVolverTeorico()" style="color: inherit; text-decoration: none;" id="btn-back-teorico">← VOLVER AL MENÚ</a>
        </div>
        <h1 class="massive-title" style="color: var(--neon);">TEÓRICO.</h1>
    </header>

    <div class="container">
        <!-- VISTA: QUIZ -->
        <main id="quiz-container" class="view active">
            <div class="card">
                <div class="quiz-header">
                    <span id="pregunta-counter">Pregunta 1 de 35</span>
                    <span id="timer-counter" style="color: var(--danger); font-weight: 900; letter-spacing: 0.1em; font-variant-numeric: tabular-nums;">⏱ 45:00</span>
                    <span id="score-counter">Aciertos: 0</span>
                </div>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                
                <h2 id="pregunta-text" class="pregunta-title">Cargando examen...</h2>
                <p id="pregunta-instruction" class="hidden text-muted"></p>

                <div id="pregunta-image-container" class="hidden">
                    <img id="pregunta-image" src="" alt="Situación de Tránsito" style="max-width: 100%; border-radius: 8px;">
                </div>

                <div id="opciones-container" class="opciones-grid"></div>

                <div class="quiz-footer">
                    <button id="btn-confirmar" class="btn btn-primary hidden">Confirmar Respuesta</button>
                    <button id="btn-siguiente" class="btn btn-primary hidden">Siguiente Pregunta</button>
                </div>
            </div>
        </main>

        <!-- RESULTADOS -->
        <div id="resultados-container" class="view hidden">
            <div class="card text-center">
                <h2 style="font-size: 3rem; margin-bottom: 20px;">Resultado Final</h2>
                <div id="score-circle" class="score-circle">
                    <span id="resultado-final">0%</span>
                </div>
                <div id="estado-final" class="score-label" style="font-size: 2rem; font-weight: 900;">REPROBADO</div>
                <div id="mensaje-final" class="margin-v-20" style="margin: 20px 0; font-size: 1.2rem;"></div>
                
                <div id="revision-errores" class="revision-container" style="text-align: left; margin-top: 40px;"></div>
                
                <div style="display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap;">
                    <button onclick="location.reload()" class="btn-primary-large" style="background: var(--neon); color: black;">Repetir Examen</button>
                    <button onclick="window.location.href='index.html'" class="btn-primary-large" style="background: var(--gray-dark); color: white;">Menú Principal</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="brutal-footer">
        <div class="footer-links">
            <a href="https://www.conaset.cl/" target="_blank">CONASET</a>
            <a href="https://www.munimacul.cl/" target="_blank">MACUL</a>
        </div>
        <div class="footer-credit">DEV BY <a href="https://dantagle.cl" target="_blank">DANTAGLE.CL</a></div>
    </footer>

    <script src="preguntas.js"></script>
    <script src="app.js?v=1.3"></script>
    <script>
        function manejarBotonVolverTeorico() {
            const results = document.getElementById('resultados-container');
            if (results.classList.contains('hidden')) {
                if (confirm('¿Está seguro de que desea abandonar el examen? Se perderá su progreso.')) {
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        }
        
        // Iniciar examen de 35 preguntas automáticamente al cargar
        if(typeof iniciarTest === 'function') iniciarTest(0, 35);
    </script>
</body>
</html>
